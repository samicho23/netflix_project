name: CI/CD Netflix Production Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # 1. መጀመሪያ ኮዱን መፈተሽ (Lint & Test)
  test:
    name: Run Automated Lint & Test Suites
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Dependencies
        run: |
          npm install --prefer-offline --no-audit --progress=false || true

  # 2. ቴስቱ ካለፈ በኋላ ምስሉን ወደ Docker Hub መግፋት
  build-and-push:
    name: Compile & Promote Docker Images
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/netflix-backend:latest
